        svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
        svg.setAttribute('width', W);
        svg.setAttribute('height', H);
        svg.innerHTML = '';

        if (!series.length) {
          svg.innerHTML = '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#787b86" font-size="14">' + escapeHtml(t('empty_data', '暂无数据')) + '</text>';
          return;
        }

        const PAD_L = 16, PAD_R = 78, TOP = 22, BOT = 56;
        const INNER_W = W - PAD_L - PAD_R;
        const INNER_H = H - TOP - BOT;

        const allValues = [];
        series.forEach(function (s) {
          (s.points || []).forEach(function (p) {
            const v = Number(p.value);
            if (Number.isFinite(v)) allValues.push(v);
          });
        });
        if (!allValues.length) return;

        let minY = Math.min.apply(null, allValues);
        let maxY = Math.max.apply(null, allValues);
        if (minY === maxY) { minY -= 1; maxY += 1; }
        const padY = (maxY - minY) * 0.10;
        minY -= padY; maxY += padY;

        const refSeries = series.reduce(function (a, b) {
          return (b.points || []).length > (a.points || []).length ? b : a;
        }, series[0]);
        const refPts = refSeries.points || [];
        const N = refPts.length;

        const xPx = function (i) {
          if (N <= 1) return PAD_L + INNER_W / 2;
          return PAD_L + (i / (N - 1)) * INNER_W;
        };
        const yPx = function (v) {
          return TOP + (1 - (v - minY) / (maxY - minY)) * INNER_H;
        };

        const cs = getComputedStyle(ROOT);
        const gridColor = cs.getPropertyValue('--grid').trim() || 'rgba(255,255,255,0.04)';
        const mutedColor = cs.getPropertyValue('--muted').trim() || '#787b86';
        const crosshairColor = cs.getPropertyValue('--crosshair').trim() || 'rgba(160,167,184,0.5)';
        const bgColor = cs.getPropertyValue('--bg').trim() || '#ffffff';

        // grid (5 steps 对齐 overview_chart)
        const gridSteps = 5;
        for (let i = 0; i <= gridSteps; i++) {
          const y = TOP + (i / gridSteps) * INNER_H;
          const line = document.createElementNS(svgNS, 'line');
          line.setAttribute('x1', PAD_L);
          line.setAttribute('y1', y);
          line.setAttribute('x2', PAD_L + INNER_W);
          line.setAttribute('y2', y);
          line.setAttribute('stroke', gridColor);
          line.setAttribute('stroke-width', '1');
          svg.appendChild(line);

          const val = maxY - (i / gridSteps) * (maxY - minY);
          const lab = document.createElementNS(svgNS, 'text');
          lab.setAttribute('x', W - 10);
          lab.setAttribute('y', y + 4);
          lab.setAttribute('text-anchor', 'end');
          lab.setAttribute('fill', mutedColor);
          lab.setAttribute('font-size', '11');
          lab.textContent = nf(val, 2);
          svg.appendChild(lab);
        }

        // gradient defs (每条线一个淡色渐变，多线叠加用低透明度保持清爽)
        const defs = document.createElementNS(svgNS, 'defs');
        series.forEach(function (s, sIdx) {
          const color = colors[sIdx % colors.length];
          const grad = document.createElementNS(svgNS, 'linearGradient');
          grad.setAttribute('id', 'mlc-grad-' + idx + '-' + sIdx);
          grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
          grad.setAttribute('x2', '0'); grad.setAttribute('y2', '1');
          const stop1 = document.createElementNS(svgNS, 'stop');
          stop1.setAttribute('offset', '0%');
          stop1.setAttribute('stop-color', color);
          stop1.setAttribute('stop-opacity', '0.14');
          const stop2 = document.createElementNS(svgNS, 'stop');
          stop2.setAttribute('offset', '100%');
          stop2.setAttribute('stop-color', color);
          stop2.setAttribute('stop-opacity', '0');
          grad.appendChild(stop1);
          grad.appendChild(stop2);
          defs.appendChild(grad);
        });
        svg.appendChild(defs);

        // 前填充(forward-fill)：停牌期间 value 为 null/NaN 时，用上一个有效
        // 值画平线（停牌不改变净值的实际表现），而不是让线断开或掉到 0。
        // 开头还没有有效值的点直接跳过（没法往前填）。
        // seriesFilled[sIdx][i] = 该 series 第 i 个点的前填充值(null 表示还没有)
        //
        // ⚠️ 必须显式判断 null/undefined/空串，不能直接 Number() —— JS 陷阱：
        //    Number(null) === 0（不是 NaN），Number.isFinite(0) === true，
        //    会把停牌天当成"0 净值"画到图底，出现矩形 dip。
        const seriesFilled = series.map(function (s) {
          let lastValid = null;
          return (s.points || []).map(function (p) {
            const raw = p ? p.value : null;
            if (raw === null || raw === undefined || raw === '') return lastValid;
            const v = Number(raw);
            if (Number.isFinite(v)) { lastValid = v; return v; }
            return lastValid;
          });
        });

        // series（先面积再折线，后画的在上）
        const seriesEls = [];
        series.forEach(function (s, sIdx) {
          const filled = seriesFilled[sIdx];
          const pts = [];
          filled.forEach(function (v, i) {
            if (v !== null) pts.push([xPx(i), yPx(v)]);
          });
          if (!pts.length) return;
          const color = colors[sIdx % colors.length];

          // area fill with gradient
          const areaD =
            'M ' + pts[0][0] + ',' + (TOP + INNER_H) + ' ' +
            pts.map(function (pt) { return 'L ' + pt[0] + ',' + pt[1]; }).join(' ') +
            ' L ' + pts[pts.length - 1][0] + ',' + (TOP + INNER_H) + ' Z';
          const areaPath = document.createElementNS(svgNS, 'path');
          areaPath.setAttribute('d', areaD);
          areaPath.setAttribute('fill', 'url(#mlc-grad-' + idx + '-' + sIdx + ')');
          svg.appendChild(areaPath);

          const poly = document.createElementNS(svgNS, 'polyline');
          poly.setAttribute('points', pts.map(function (pt) { return pt[0] + ',' + pt[1]; }).join(' '));
          poly.setAttribute('fill', 'none');
          poly.setAttribute('stroke', color);
          poly.setAttribute('stroke-width', '1.8');
          poly.setAttribute('stroke-linecap', 'round');
          poly.setAttribute('stroke-linejoin', 'round');
          poly.setAttribute('class', 'multi-line');
          svg.appendChild(poly);
          seriesEls.push(poly);
        });

        // x axis ticks
        const tickCount = Math.max(4, Math.min(10, Math.round(W / 140)));
        for (let i = 0; i < tickCount; i++) {
          const idx2 = Math.round((N - 1) * (i / Math.max(1, tickCount - 1)));
          const point = refPts[idx2];
          const x = xPx(idx2);
          const t = document.createElementNS(svgNS, 'text');
          t.setAttribute('x', x);
          t.setAttribute('y', TOP + INNER_H + 22);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('fill', mutedColor);
          t.setAttribute('font-size', '11');
          t.textContent = axisLabel(point);
          svg.appendChild(t);
        }

        // legend
        let legendX = PAD_L;
        const legendY = H - 18;
        series.forEach(function (s, sIdx) {
          const color = colors[sIdx % colors.length];
          const sw = document.createElementNS(svgNS, 'rect');
          sw.setAttribute('x', legendX);
          sw.setAttribute('y', legendY - 4);
          sw.setAttribute('width', '14');
          sw.setAttribute('height', '3');
          sw.setAttribute('rx', '1.5');
          sw.setAttribute('fill', color);
          svg.appendChild(sw);
          const label = document.createElementNS(svgNS, 'text');
          label.setAttribute('x', legendX + 22);
          label.setAttribute('y', legendY + 1);
          label.setAttribute('fill', mutedColor);
          label.setAttribute('font-size', '12');
          label.textContent = s.name || ('Series ' + (sIdx + 1));
          svg.appendChild(label);
          legendX += 22 + (s.name || '').length * 7 + 18;
        });

        // crosshair: 垂直虚线 + 每条线交点圆点 + 右侧值 badge
        const ch = document.createElementNS(svgNS, 'g');
        ch.style.display = 'none';
        ch.style.pointerEvents = 'none';
        const chV = document.createElementNS(svgNS, 'line');
        chV.setAttribute('y1', TOP);
        chV.setAttribute('y2', TOP + INNER_H);
        chV.setAttribute('stroke', crosshairColor);
        chV.setAttribute('stroke-width', '1');
        chV.setAttribute('stroke-dasharray', '3 3');
        ch.appendChild(chV);

        // 每条 series 一个 dot（圆点）+ badge（右侧值胶囊）
        const chDots = [];
        const chBadges = [];
        series.forEach(function (s, sIdx) {
          const color = colors[sIdx % colors.length];
          const dot = document.createElementNS(svgNS, 'circle');
          dot.setAttribute('r', '4');
          dot.setAttribute('fill', color);
          dot.setAttribute('stroke', bgColor);
          dot.setAttribute('stroke-width', '2');
          ch.appendChild(dot);
          chDots.push(dot);

          const bg = document.createElementNS(svgNS, 'rect');
          bg.setAttribute('x', PAD_L + INNER_W + 2);
          bg.setAttribute('width', W - PAD_L - INNER_W - 6);
          bg.setAttribute('height', '16');
          bg.setAttribute('rx', '3');
          bg.setAttribute('fill', color);
          ch.appendChild(bg);

          const txt = document.createElementNS(svgNS, 'text');
          txt.setAttribute('x', W - 10);
          txt.setAttribute('text-anchor', 'end');
          txt.setAttribute('fill', '#fff');
          txt.setAttribute('font-size', '10');
          txt.setAttribute('font-weight', '700');
          txt.setAttribute('dominant-baseline', 'middle');
          ch.appendChild(txt);
          chBadges.push({ bg: bg, txt: txt });
        });
        svg.appendChild(ch);

        const overlay = document.createElementNS(svgNS, 'rect');
        overlay.setAttribute('x', PAD_L);
        overlay.setAttribute('y', TOP);
        overlay.setAttribute('width', INNER_W);
        overlay.setAttribute('height', INNER_H);
        overlay.setAttribute('fill', 'transparent');
        overlay.style.cursor = 'crosshair';
        svg.appendChild(overlay);

        if (firstRender) {
          firstRender = false;
          seriesEls.forEach(function (path, i) {
            try {
              const len = path.getTotalLength();
              path.style.strokeDasharray = len;
              path.style.strokeDashoffset = len;
              path.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(0.25, 0.1, 0.25, 1) ' + (i * 0.18) + 's';
              requestAnimationFrame(function () { path.style.strokeDashoffset = '0'; });
            } catch (e) { /* ignore */ }
          });
        }

        overlay.addEventListener('pointermove', function (evt) {
          const rect = svg.getBoundingClientRect();
          const x = evt.clientX - rect.left;
          if (x < PAD_L || x > PAD_L + INNER_W) {
            ch.style.display = 'none';
            tooltip.classList.add('hidden');
            return;
          }
          const ratio = (x - PAD_L) / INNER_W;
          const i = Math.max(0, Math.min(N - 1, Math.round(ratio * (N - 1))));
          const xCoord = xPx(i);

          ch.style.display = '';
          chV.setAttribute('x1', xCoord);
          chV.setAttribute('x2', xCoord);

          // 更新每条线的圆点 + 右侧 badge，排序避免重叠
          // 用前填充后的 seriesFilled 取值，停牌日也能显示最后一个有效值
          const badgeEntries = [];
          series.forEach(function (s, sIdx) {
            const v = (seriesFilled[sIdx] || [])[i];
            const dot = chDots[sIdx];
            const badge = chBadges[sIdx];
            if (v == null) {
              if (dot) dot.style.display = 'none';
              if (badge) { badge.bg.style.display = 'none'; badge.txt.style.display = 'none'; }
              return;
            }
            const yCoord = yPx(v);
            if (dot) {
              dot.style.display = '';
              dot.setAttribute('cx', xCoord);
              dot.setAttribute('cy', yCoord);
            }
            badgeEntries.push({ sIdx: sIdx, y: yCoord, text: nf(v, 2) });
          });
          // y 轴从上往下排，各 badge 间最小间距 18px 防重叠；不超出图区底部
          badgeEntries.sort(function (a, b) { return a.y - b.y; });
          const yMax = TOP + INNER_H - 8;  // 底部留 8px 给 badge 一半高
          let lastY = -Infinity;
          badgeEntries.forEach(function (e) {
            const badge = chBadges[e.sIdx];
            if (!badge) return;
            const y = Math.min(Math.max(lastY + 18, e.y), yMax);
            lastY = y;
            badge.bg.style.display = '';
            badge.txt.style.display = '';
            badge.bg.setAttribute('y', y - 8);
            badge.txt.setAttribute('y', y);
            badge.txt.textContent = e.text;
          });

          const point = refPts[i];
          let rows = '';
          series.forEach(function (s, sIdx) {
            const p = (s.points || [])[i];
            if (!p) return;
            const v = Number(p.value);
            const color = colors[sIdx % colors.length];
            rows += '<div class="tooltip-row"><span class="key" style="--swatch:' + color + '">' + escapeHtml(s.name || ('S' + (sIdx + 1))) + '</span><span class="val">' + nf(v, 2) + '</span></div>';
          });
          tooltip.classList.remove('hidden');
          tooltip.innerHTML = '<div class="tooltip-date">' + escapeHtml(fullLabel(point)) + '</div>' + rows;

          const shellRect = wrap.getBoundingClientRect();
          const ttRect = tooltip.getBoundingClientRect();
          const localX = evt.clientX - shellRect.left;
          const isLeft = localX > shellRect.width / 2;
          tooltip.style.left = (isLeft ? 18 : Math.max(18, shellRect.width - ttRect.width - 18)) + 'px';
          tooltip.style.top = '18px';
        });
        overlay.addEventListener('pointerleave', function () {
          ch.style.display = 'none';
          tooltip.classList.add('hidden');
        });
      }

      render();
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(function () { render(); });
        ro.observe(wrap);
      } else {
        window.addEventListener('resize', render);
      }
    }

    // ---------------- mount charts + interactivity ----------------
    function mountCharts(modules) {
      modules.forEach(function (module, idx) {
        if (module.type === 'overview_chart') {
          const host = document.getElementById('module-host-' + idx);
          if (!host) return;
          const chart = buildOverviewChart(host, module, idx);

          const moduleEl = document.querySelector('[data-module="' + idx + '"]');
          if (!moduleEl) return;

          // toggles
          moduleEl.querySelectorAll('.toggle-item').forEach(function (el) {
            el.addEventListener('click', function () {
              const id = (el.getAttribute('data-toggle') || '').toLowerCase();
              if (id.indexOf('overlay_') === 0) {
                var sIdx = parseInt(id.replace('overlay_', ''), 10);
                var visible = chart.toggleOverlay(sIdx);
                el.classList.toggle('muted', !visible);
              } else if (id.indexOf('drawdown') >= 0) {
                const visible = chart.toggleDrawdown();
                el.classList.toggle('muted', !visible);
              } else if (id.indexOf('trade') >= 0) {
                const visible = chart.toggleTrades();
                el.classList.toggle('muted', !visible);
              } else {
                el.classList.toggle('muted');
              }
            });
          });

          // mode switch
          const modeEls = moduleEl.querySelectorAll('.mode-chip');
          modeEls.forEach(function (el) {
            el.addEventListener('click', function () {
              modeEls.forEach(function (m) { m.classList.remove('active'); });
              el.classList.add('active');
              const id = (el.getAttribute('data-mode') || '').toLowerCase();
              chart.setMode(id === 'percentage' ? 'percentage' : 'absolute');
            });
          });
        } else if (module.type === 'line_chart') {
          const host = document.getElementById('module-host-' + idx);
          if (host) buildMultiLineChart(host, module, idx);
        } else if (module.type === 'custom_html') {
          const host = document.getElementById('module-host-' + idx);
          if (!host) return;
          try {
            host.innerHTML = module.html || '';
            // innerHTML does NOT execute injected script tags — recreate each
            // one so it runs. Supports both inline code and external src=.
            host.querySelectorAll('script').forEach(function (oldScript) {
              const newScript = document.createElement('script');
              for (let i = 0; i < oldScript.attributes.length; i++) {
                const a = oldScript.attributes[i];
                newScript.setAttribute(a.name, a.value);
              }
              newScript.textContent = oldScript.textContent;
              oldScript.parentNode.replaceChild(newScript, oldScript);
            });
            // Optional init callback — host DOM element and module dict are
            // passed in so the script can mount echarts/d3/whatever against
            // the right container.
            if (module.mount_script) {
              try {
                new Function('host', 'module', module.mount_script)(host, module);
              } catch (e) {
                const err = document.createElement('pre');
                err.className = 'custom-html-error';
                err.textContent = 'mount_script error: ' + (e && e.message ? e.message : String(e));
                host.appendChild(err);
              }
            }
          } catch (e) {
            console.error('custom_html render error:', e);
          }
        }
      });
    }

    // ---------------- tabs ----------------
    function buildPanels(modules, tabs) {
      const groups = {};
      tabs.forEach(function (tab) { groups[tab.id] = []; });
      modules.forEach(function (module, idx) {
        const tab = module.tab || tabs[0].id;
        if (!groups[tab]) groups[tab] = [];
        groups[tab].push(renderModule(module, idx));
      });
      return groups;
    }

    function renderTabs(tabs, activeTab, panelsByTab) {
      const tabsEl = document.getElementById('tabs');
      const panelsEl = document.getElementById('tab-panels');

      // Hide the tab bar entirely when there's only one tab — single-page mode.
      if (tabs.length <= 1) {
        tabsEl.style.display = 'none';
      }

      tabsEl.innerHTML = tabs.map(function (tab) {
        return '<button class="tab ' + (tab.id === activeTab ? 'active' : '') + '" data-tab="' + escapeHtml(tab.id) + '">' + escapeHtml(tab.label) + '</button>';
      }).join('') + '<span class="tab-indicator"></span>';

      panelsEl.innerHTML = tabs.map(function (tab) {
        return '<section class="tab-panel ' + (tab.id === activeTab ? 'active' : '') + '" data-tab-panel="' + escapeHtml(tab.id) + '">' +
          '<div class="module-grid">' + (panelsByTab[tab.id] || []).join('') + '</div>' +
        '</section>';
      }).join('');

      function updateIndicator() {
        const indicator = tabsEl.querySelector('.tab-indicator');
        const active = tabsEl.querySelector('.tab.active');
        if (!active || !indicator) return;
        const r = active.getBoundingClientRect();
        const pr = tabsEl.getBoundingClientRect();
        indicator.style.width = r.width + 'px';
        indicator.style.transform = 'translateX(' + (r.left - pr.left) + 'px)';
      }

      tabsEl.querySelectorAll('.tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const next = btn.getAttribute('data-tab');
          tabsEl.querySelectorAll('.tab').forEach(function (el) { el.classList.toggle('active', el === btn); });
          panelsEl.querySelectorAll('.tab-panel').forEach(function (panel) {
            panel.classList.toggle('active', panel.getAttribute('data-tab-panel') === next);
          });
          updateIndicator();
        });
      });

      requestAnimationFrame(updateIndicator);
      window.addEventListener('resize', updateIndicator);
    }

    // ---------------- bootstrap ----------------
    const meta = REPORT.meta || {};
    const ui = REPORT.ui || {};
    const tabs = (ui.tabs && ui.tabs.length) ? ui.tabs : [{ id: 'overview', label: 'Overview' }];
    const activeTab = ui.active_tab || tabs[0].id;
    const modules = REPORT.modules || [];

    renderTopbar(meta, ui);
    renderHeader(meta, ui);

    const panelsByTab = buildPanels(modules, tabs);
    renderTabs(tabs, activeTab, panelsByTab);
    mountCharts(modules);
  })();
  </script>
</body>
</html>
