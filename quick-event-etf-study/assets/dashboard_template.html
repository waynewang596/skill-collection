<!doctype html>
<html lang="__HTML_LANG__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__REPORT_TITLE__</title>
  <script>
    // Set theme before CSS parses to avoid FOUC
    document.documentElement.setAttribute(
      'data-theme',
      (function () { try { return localStorage.getItem('bt-theme') || 'light'; } catch (e) { return 'light'; } })()
    );
  </script>
  <style>
    /* ---------------- design tokens ---------------- */
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg-elev: #131722;
      --surface: #161b22;
      --surface-2: #1c2030;
      --hover: #1f2433;
      --border: #1f2230;
      --border-strong: #2a2e3e;
      --text: #d1d4dc;
      --text-strong: #f0f3fa;
      --muted: #787b86;
      --muted-2: #50535e;
      --accent: #2962ff;
      --accent-glow: rgba(41, 98, 255, 0.18);
      --gain: #60a5fa;
      --gain-strong: #93c5fd;
      --gain-glow: rgba(96, 165, 250, 0.15);
      --loss: #64748b;
      --loss-strong: #94a3b8;
      --loss-glow: rgba(100, 116, 139, 0.15);
      --market-up: var(--gain);
      --market-down: var(--loss);
      --warn: #ff9800;
      --neutral: #b2b5be;
      --grid: rgba(255, 255, 255, 0.04);
      --grid-strong: rgba(255, 255, 255, 0.10);
      --crosshair: rgba(160, 167, 184, 0.50);
      --shadow-soft: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.32);
    }

    :root[data-theme="light"] {
      --bg: #ffffff;
      --bg-elev: #f8f9fc;
      --surface: #ffffff;
      --surface-2: #f3f5f9;
      --hover: #eef1f8;
      --border: #e6e8ee;
      --border-strong: #d6dae3;
      --text: #131722;
      --text-strong: #0a0d14;
      --muted: #6a6d78;
      --muted-2: #8c8f99;
      --accent: #2962ff;
      --accent-glow: rgba(41, 98, 255, 0.12);
      --gain: #089981;
      --gain-strong: #00a884;
      --gain-glow: rgba(8, 153, 129, 0.12);
      --loss: #64748b;
      --loss-strong: #475569;
      --loss-glow: rgba(100, 116, 139, 0.12);
      --market-up: var(--gain);
      --market-down: var(--loss);
      --warn: #ff9800;
      --neutral: #4a4d57;
      --grid: rgba(0, 0, 0, 0.04);
      --grid-strong: rgba(0, 0, 0, 0.08);
      --crosshair: rgba(60, 65, 80, 0.45);
      --shadow-soft: 0 1px 0 rgba(0,0,0,0.02) inset, 0 6px 24px rgba(19,23,34,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Noto Sans SC', sans-serif;
      font-feature-settings: 'tnum' 1, 'cv11' 1, 'ss01' 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ---------------- topbar ---------------- */
    .topbar {
      height: 50px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      gap: 16px;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .tb-left, .tb-right { display: flex; align-items: center; gap: 12px; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text-strong);
    }
    .brand-logo {
      width: 24px; height: 24px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent) 0%, #6b8eff 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
      letter-spacing: 0;
    }
    .brand-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }
    .brand-strategy {
      color: var(--muted);
      font-weight: 500;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .menu-chip {
      padding: 6px 12px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      cursor: default;
      user-select: none;
    }
    .menu-chip:hover { background: var(--hover); }
    .menu-chip.active {
      background: var(--surface-2);
      border-color: var(--border);
      font-weight: 600;
      color: var(--text-strong);
    }

    .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); display: inline-block; }
    .dot.green { background: var(--gain); box-shadow: 0 0 0 2px var(--gain-glow); }

    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .icon-btn:hover {
      background: var(--hover);
      color: var(--text-strong);
      border-color: var(--border-strong);
    }

    /* ---------------- page ---------------- */
    .page {
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 28px 56px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      padding: 4px 0 24px;
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .report-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-strong);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .symbol-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
      letter-spacing: 0.02em;
    }

    .report-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pulse {
      width: 7px; height: 7px;
      border-radius: 999px;
      background: var(--gain);
      animation: pulse 2.4s ease-out infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0.55); }
      70%  { box-shadow: 0 0 0 8px rgba(38, 166, 154, 0); }
      100% { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0); }
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      font-feature-settings: 'tnum';
    }
    .date-badge .arrow { color: var(--muted); }

    /* ---------------- tabs ---------------- */
    .tabs {
      display: flex;
      align-items: center;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
      position: relative;
      flex-wrap: wrap;
    }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
      font-family: inherit;
      letter-spacing: -0.005em;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text-strong); font-weight: 600; }
    .tab-indicator {
      position: absolute;
      bottom: -1px;
      left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      transition: transform 0.4s cubic-bezier(0.5, 0, 0.2, 1), width 0.4s cubic-bezier(0.5, 0, 0.2, 1);
      pointer-events: none;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .tab-panels { display: block; }
    .tab-panel {
      display: none;
      animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .tab-panel.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------------- modules ---------------- */
    .module-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }

    .module {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .module.span-6 { grid-column: span 6; }
    .module.span-4 { grid-column: span 4; }
    .module.span-8 { grid-column: span 8; }

    .module-grid > .module:nth-child(1) { animation-delay: 0.05s; }
    .module-grid > .module:nth-child(2) { animation-delay: 0.12s; }
    .module-grid > .module:nth-child(3) { animation-delay: 0.18s; }
    .module-grid > .module:nth-child(4) { animation-delay: 0.24s; }
    .module-grid > .module:nth-child(5) { animation-delay: 0.30s; }

    .module-header {
      padding: 18px 22px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .module-title {
      font-size: 12px;
      font-weight: 700;
      margin: 0;
      color: var(--text-strong);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .module-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: var(--accent);
    }
    .module-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin: 6px 0 0 13px;
    }
    .module-body { padding: 18px 22px; }

    /* ---------------- KPI strip ---------------- */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
    }
    .kpi-item { min-width: 0; }
    .kpi-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .kpi-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-strong);
      font-feature-settings: 'tnum';
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kpi-sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-feature-settings: 'tnum';
    }

    .positive { color: var(--market-up, var(--gain)) !important; }
    .negative { color: var(--market-down, var(--loss)) !important; }

    /* ---------------- chart card ---------------- */
    .tv-chart-card { padding: 0; }
    .tv-chart-top {
      padding: 22px 24px 20px;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tv-chart-stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 28px;
      flex: 1;
    }

    .tv-chart-area { padding: 0; position: relative; }

    .chart-shell {
      width: 100%;
      height: 460px;
      position: relative;
      background: transparent;
    }
    .chart-shell svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .chart-shell svg text { font-family: inherit; }

    .chart-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 24px 16px;
      border-top: 1px solid var(--border);
    }
    .toggle-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
    }
    .toggle-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-item:hover { background: var(--hover); }
    .toggle-item.muted { color: var(--muted-2); }
    .toggle-item.muted .toggle-swatch { opacity: 0.35; }
    .toggle-swatch {
      width: 14px;
      height: 3px;
      border-radius: 2px;
      background: var(--gain);
      transition: opacity 0.15s;
    }

    .mode-switch {
      display: inline-flex;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .mode-chip {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }
    .mode-chip:hover { color: var(--text); }
    .mode-chip.active {
      background: var(--bg);
      color: var(--text-strong);
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    /* ---------------- tooltip ---------------- */
    .tooltip {
      position: absolute;
      top: 18px;
      left: 18px;
      background: color-mix(in srgb, var(--surface-2) 92%, transparent);
      border: 1px solid var(--border-strong);
      border-radius: 9px;
      padding: 12px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 5;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      font-feature-settings: 'tnum';
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.12s ease;
    }
    .tooltip.hidden { opacity: 0; }
    .tooltip-date {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 9px;
      font-weight: 600;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 3px 0;
    }
    .tooltip-row .key {
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .tooltip-row .key::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      background: var(--swatch, var(--accent));
      flex-shrink: 0;
    }
    .tooltip-row .val {
      color: var(--text-strong);
      font-weight: 600;
    }

    /* ---------------- tables ---------------- */
    .metric-table {
      width: 100%;
      border-collapse: collapse;
    }
    .metric-table th, .metric-table td {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      text-align: right;
      vertical-align: top;
      font-size: 14px;
      font-feature-settings: 'tnum';
    }
    .metric-table th:first-child, .metric-table td:first-child {
      text-align: left;
      width: 40%;
      color: var(--muted);
    }
    .metric-table thead th {
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface);
    }
    .metric-table tbody tr { transition: background 0.12s ease; }
    .metric-table tbody tr:hover { background: var(--hover); }
    .metric-table tbody tr:last-child td { border-bottom: 0; }
    .metric-main {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-strong);
    }
    .metric-secondary {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      font-weight: 500;
    }

    .trades-table-wrap { overflow-x: auto; }
    .trades-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 940px;
    }
    .trades-table th, .trades-table td {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 13px;
      font-feature-settings: 'tnum';
    }
    .trades-table thead th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--surface-2);
      position: sticky;
      top: 0;
      font-weight: 600;
    }
    .trades-table tbody tr { transition: background 0.12s ease; }
    .trades-table tbody tr:hover { background: var(--hover); }
    .trades-table tbody tr:last-child td { border-bottom: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--gain-glow);
      color: var(--gain);
      border: 1px solid transparent;
    }
    .pill.negative {
      background: var(--loss-glow);
      color: var(--loss);
    }
    .pill::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
    }

    .text-card {
      color: var(--text);
      line-height: 1.7;
      font-size: 14px;
    }

    .empty {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ---------------- responsive ---------------- */
    @media (max-width: 1180px) {
      .kpi-strip, .tv-chart-stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .module.span-6, .module.span-4, .module.span-8 { grid-column: span 12; }
    }
    @media (max-width: 720px) {
      .topbar { flex-direction: column; align-items: flex-start; height: auto; padding: 12px; }
      .report-header { flex-direction: column; align-items: stretch; }
      .kpi-strip, .tv-chart-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-shell { height: 360px; }
      .page { padding: 16px; }
    }

    /* ---------------- scrollbar ---------------- */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="topbar" id="topbar">
      <div class="tb-left" id="topbar-left"></div>
      <div class="tb-right" id="topbar-right"></div>
    </div>

    <main class="page">
      <section class="report-header">
        <div>
          <h1 class="report-title" id="report-title"></h1>
          <div class="report-subtitle" id="report-subtitle"></div>
        </div>
        <div class="date-badge" id="report-date"></div>
      </section>

      <div class="tabs" id="tabs"></div>
      <div class="tab-panels" id="tab-panels"></div>
    </main>
  </div>

  <script id="report-data" type="application/json">__REPORT_DATA__</script>
  <script>
  (function () {
    'use strict';

    const REPORT = JSON.parse(document.getElementById('report-data').textContent || '{}');
    const ROOT = document.documentElement;

    const MARKET_COLORS = {
      china_a: { up: '#ef5350', down: '#26a69a' },
      us: { up: '#26a69a', down: '#ef5350' },
    };
    const market = (REPORT.meta && REPORT.meta.market) || 'china_a';
    const marketColors = MARKET_COLORS[market] || MARKET_COLORS.china_a;
    ROOT.style.setProperty('--market-up', marketColors.up);
    ROOT.style.setProperty('--market-down', marketColors.down);

    // i18n bag from report_data.ui.i18n. When older payloads omit it, fall
    // back according to the resolved report language instead of defaulting to English.
    const REPORT_LANGUAGE = String(
      (REPORT.ui && REPORT.ui.language) || (REPORT.meta && REPORT.meta.language) || 'en'
    ).toLowerCase();
    const FALLBACK_I18N = {
      zh: {
        html_lang: 'zh-CN',
        strategy_fallback: '策略',
        subtitle_fallback: '事件研究 ETF 看板',
        event_date_label: '事件日',
        brand: '事件研究',
        status_ready: '就绪',
        theme_toggle: '切换主题',
        drawdown_pane: '回撤',
        tooltip_equity: '净值',
        tooltip_return: '收益',
        tooltip_drawdown: '回撤',
        empty_data: '暂无数据',
        empty_trades: '暂无成分股',
        empty_content: '暂无内容',
        trades_col_symbol: '名称',
        trades_col_side: '梯队',

    // ---------------- format helpers ----------------
    function nf(value, digits) {
      if (digits == null) digits = 2;
      if (value == null || Number.isNaN(Number(value))) return '--';
      return Number(value).toLocaleString('en-US', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      });
    }
    function pf(value, digits) {
      if (digits == null) digits = 2;
      if (value == null || Number.isNaN(Number(value))) return '--';
      return nf(value, digits) + '%';
    }
    function signed(value, digits, suffix) {
      if (digits == null) digits = 2;
      if (suffix == null) suffix = '';
      if (value == null || Number.isNaN(Number(value))) return '--';
      const num = Number(value);
      return (num > 0 ? '+' : '') + nf(num, digits) + suffix;
    }
    function signClass(value) {
      if (value == null || Number.isNaN(Number(value))) return '';
      return Number(value) >= 0 ? 'positive' : 'negative';
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function axisLabel(point) {
      const raw = point && (point.date != null ? point.date : (point.x != null ? point.x : point.label));
      if (!raw) return '';
      const text = String(raw);
      if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text.slice(5);
      if (/^\d{4}-\d{2}$/.test(text)) return text;
      return text;
    }
    function fullLabel(point) {
      const raw = point && (point.date != null ? point.date : (point.x != null ? point.x : point.label));
      return raw ? String(raw) : '';
    }

    // ---------------- tabs ----------------

      const tabs = (ui && ui.tabs) || [{ id: 'overview', label: t('tab_overview', 'Overview') }];
      const active = (ui && ui.active_tab) || (tabs[0] && tabs[0].id) || 'overview';

      // Tab buttons
      tabsEl.innerHTML = tabs.map(function (tab, i) {
        return '<button class="tab ' + (tab.id === active ? 'active' : '') + '" data-tab="' + tab.id + '">' + escapeHtml(tab.label) + '</button>';
      }).join('') + '<div class="tab-indicator" id="tab-indicator"></div>';

      // Tab panels
      const modulesByTab = {};
      (REPORT.modules || []).forEach(function (m) {
        const tabId = m.tab || 'overview';
        if (!modulesByTab[tabId]) modulesByTab[tabId] = [];
        modulesByTab[tabId].push(m);
      });

      panelsEl.innerHTML = tabs.map(function (tab) {
        const mods = modulesByTab[tab.id] || [];
        return '<div class="tab-panel ' + (tab.id === active ? 'active' : '') + '" data-panel="' + tab.id + '">' +
          '<div class="module-grid">' + mods.map(renderModule).join('') + '</div>' +
        '</div>';
      }).join('');

      // Wire tab switching
      tabsEl.querySelectorAll('.tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const tid = btn.getAttribute('data-tab');
          tabsEl.querySelectorAll('.tab').forEach(function (b) { b.classList.toggle('active', b === btn); });
          panelsEl.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.toggle('active', p.getAttribute('data-panel') === tid); });
          positionIndicator(btn);
        });
      });

      // Position indicator under active tab
      const indicator = document.getElementById('tab-indicator');
      function positionIndicator(target) {
        if (!indicator || !target) return;
        indicator.style.transform = 'translateX(' + target.offsetLeft + 'px)';
        indicator.style.width = target.offsetWidth + 'px';
      }
      const activeBtn = tabsEl.querySelector('.tab.active');
      if (activeBtn) positionIndicator(activeBtn);
      window.addEventListener('resize', function () {
        const ab = tabsEl.querySelector('.tab.active');
        if (ab) positionIndicator(ab);
      });
    }

    // ---------------- custom html mount scripts ----------------
    function runMountScripts() {
      document.querySelectorAll('.mount-script').forEach(function (scriptEl) {
        const idx = scriptEl.getAttribute('data-idx');
        const host = document.getElementById('module-host-' + idx);
        const module = (REPORT.modules || [])[Number(idx)];
        if (!module || !host) return;
        try {
          // eslint-disable-next-line no-new-func
          const fn = new Function('host', 'module', scriptEl.textContent);
          fn(host, module);
        } catch (err) {
          console.error('Mount script error for module', idx, err);
          const pre = document.createElement('pre');
          pre.className = 'custom-html-error';
          pre.style.cssText = 'color:#ef4444;font-size:12px;padding:8px;';
          pre.textContent = String(err && err.message || err);
          host.appendChild(pre);
        }
      });
    }

    // ---------------- overview_chart renderer ----------------
    function renderOverviewChart(module, hostEl) {
      if (!hostEl) return;
      const points = module.points || [];
      const stats = module.stats || [];
      const toggles = module.toggles || [];
      const modes = module.modes || [];
      const seriesKey = module.series_key || 'equity';
      const stroke = module.stroke || '#2dd4bf';
      const barsKey = module.bars_key || 'drawdown_abs';
      const barsFill = module.bars_fill || 'rgba(100,116,139,0.25)';

      // Build SVG
      const W = hostEl.clientWidth || 800;
      const H = 400;
      const margin = { top: 16, right: 16, bottom: 36, left: 56 };
      const w = W - margin.left - margin.right;
      const h = H - margin.top - margin.bottom;

      // Scales
      const allVals = points.map(function (p) { return p[seriesKey]; }).filter(function (v) { return v != null; });
      const minVal = Math.min.apply(null, allVals);
      const maxVal = Math.max.apply(null, allVals);
      const pad = (maxVal - minVal) * 0.1 || 1;
      const yMin = Math.max(0, minVal - pad);
      const yMax = maxVal + pad;

      const n = points.length;
      const xStep = n > 1 ? w / (n - 1) : w;

      function xScale(i) { return margin.left + i * xStep; }
      function yScale(v) { return margin.top + h - ((v - yMin) / (yMax - yMin)) * h; }

      // Line path
      const lineD = points.map(function (p, i) {
        return (i === 0 ? 'M' : 'L') + xScale(i) + ',' + yScale(p[seriesKey]);
      }).join('');

      // Area path
      const areaD = lineD + ' L' + xScale(n - 1) + ',' + (margin.top + h) + ' L' + xScale(0) + ',' + (margin.top + h) + ' Z';

      // Grid lines
      const yTicks = 5;
      let gridLines = '';
      for (let i = 0; i <= yTicks; i++) {
        const y = margin.top + (h * i / yTicks);
        gridLines += '<line x1="' + margin.left + '" y1="' + y + '" x2="' + (margin.left + w) + '" y2="' + y + '" stroke="var(--grid)" stroke-width="1"/>';
      }

      // X axis labels (show ~8 labels)
      const xLabelStep = Math.max(1, Math.floor(n / 8));
      let xLabels = '';
      for (let i = 0; i < n; i += xLabelStep) {
        xLabels += '<text x="' + xScale(i) + '" y="' + (H - 10) + '" text-anchor="middle" fill="var(--muted)" font-size="11">' + escapeHtml(axisLabel(points[i])) + '</text>';
      }

      // Y axis labels
      let yLabels = '';
      for (let i = 0; i <= yTicks; i++) {
        const val = yMin + (yMax - yMin) * (1 - i / yTicks);
        const y = margin.top + (h * i / yTicks);
        yLabels += '<text x="' + (margin.left - 8) + '" y="' + (y + 4) + '" text-anchor="end" fill="var(--muted)" font-size="11">' + nf(val, 1) + '</text>';
      }

      // Event date line
      let eventLine = '';
      const eventDate = REPORT.meta && REPORT.meta.event_date;
      if (eventDate) {
        const evtIdx = points.findIndex(function (p) { return p.date === eventDate; });
        if (evtIdx >= 0) {
          const x = xScale(evtIdx);
          eventLine = '<line x1="' + x + '" y1="' + margin.top + '" x2="' + x + '" y2="' + (margin.top + h) + '" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 4"/>' +
            '<text x="' + (x + 6) + '" y="' + (margin.top + 16) + '" fill="#ef4444" font-size="11" font-weight="600">' + escapeHtml(t('event_date_label', 'Event Date')) + '</text>';
        }
      }

      hostEl.innerHTML = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
        '<defs>' +
          '<linearGradient id="areaGrad-' + seriesKey + '" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0%" stop-color="' + stroke + '" stop-opacity="0.15"/>' +
            '<stop offset="100%" stop-color="' + stroke + '" stop-opacity="0"/>' +
          '</linearGradient>' +
        '</defs>' +
        gridLines +
        '<path d="' + areaD + '" fill="url(#areaGrad-' + seriesKey + ')"/>' +
        '<path d="' + lineD + '" fill="none" stroke="' + stroke + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
        eventLine +
        xLabels + yLabels +
      '</svg>';
    }

    // ---------------- line_chart renderer ----------------
    function renderLineChart(module, hostEl) {
      if (!hostEl || !module.series || !module.series.length) return;

      const W = hostEl.clientWidth || 800;
      const H = 360;
      const margin = { top: 16, right: 16, bottom: 36, left: 56 };
      const w = W - margin.left - margin.right;
      const h = H - margin.top - margin.bottom;

      // Find all points across all series
      const allPoints = [];
      module.series.forEach(function (s) {
        (s.points || []).forEach(function (p) {
          allPoints.push(p);
        });
      });
      const allDates = allPoints.map(function (p) { return p.date; });
      const uniqueDates = allDates.filter(function (d, i) { return allDates.indexOf(d) === i; }).sort();
      const n = uniqueDates.length;
      if (n < 2) return;

      const xStep = w / (n - 1);
      function xScale(i) { return margin.left + i * xStep; }

      // Y scale
      const allVals = allPoints.map(function (p) { return p.value; }).filter(function (v) { return v != null; });
      const minVal = Math.min.apply(null, allVals);
      const maxVal = Math.max.apply(null, allVals);
      const pad = (maxVal - minVal) * 0.1 || 1;
      const yMin = Math.max(0, minVal - pad);
      const yMax = maxVal + pad;
      function yScale(v) { return margin.top + h - ((v - yMin) / (yMax - yMin)) * h; }

      // Colors
      const colors = ['#2dd4bf', '#f97316', '#818cf8', '#f472b6'];

      let lines = '';
      let legend = '';
      module.series.forEach(function (s, si) {
        const color = s.color || colors[si % colors.length];
        const pts = s.points || [];
        const d = pts.map(function (p, i) {
          const dateIdx = uniqueDates.indexOf(p.date);
          return (i === 0 ? 'M' : 'L') + xScale(dateIdx) + ',' + yScale(p.value);
        }).join('');
        lines += '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round"/>';
        legend += '<span style="display:inline-flex;align-items:center;gap:6px;margin-right:16px;font-size:12px;color:var(--text);">' +
          '<span style="width:14px;height:3px;border-radius:2px;background:' + color + ';"></span>' + escapeHtml(s.name) + '</span>';
      });

      // Grid
      const yTicks = 5;
      let grid = '';
      for (let i = 0; i <= yTicks; i++) {
        const y = margin.top + (h * i / yTicks);
        grid += '<line x1="' + margin.left + '" y1="' + y + '" x2="' + (margin.left + w) + '" y2="' + y + '" stroke="var(--grid)" stroke-width="1"/>';
      }

      // Labels
      const xLabelStep = Math.max(1, Math.floor(n / 8));
      let xLabels = '';
      for (let i = 0; i < n; i += xLabelStep) {
        xLabels += '<text x="' + xScale(i) + '" y="' + (H - 10) + '" text-anchor="middle" fill="var(--muted)" font-size="11">' + escapeHtml(uniqueDates[i].slice(5)) + '</text>';
      }
      let yLabels = '';
      for (let i = 0; i <= yTicks; i++) {
        const val = yMin + (yMax - yMin) * (1 - i / yTicks);
        const y = margin.top + (h * i / yTicks);
        yLabels += '<text x="' + (margin.left - 8) + '" y="' + (y + 4) + '" text-anchor="end" fill="var(--muted)" font-size="11">' + nf(val, 1) + '</text>';
      }

      hostEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);">' + legend + '</div>' +
        '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
        grid + lines + xLabels + yLabels + '</svg>';
    }

    // ---------------- mount non-custom charts ----------------
    function mountCharts() {
      (REPORT.modules || []).forEach(function (m, idx) {
        if (m.type === 'overview_chart') {
          renderOverviewChart(m, document.getElementById('module-host-' + idx));
        } else if (m.type === 'line_chart') {
          renderLineChart(m, document.getElementById('module-host-' + idx));
        }
      });
    }

    // ---------------- init ----------------
    function init() {
      renderTopbar(REPORT.meta, REPORT.ui);
      renderHeader(REPORT.meta, REPORT.ui);
      renderTabs(REPORT.ui);
      mountCharts();
      runMountScripts();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
